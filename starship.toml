add_newline = false
format = """$os$username$directory$git_branch"""

[character]
success_symbol = ''
error_symbol = ''

[os]
format = '[$symbol]($style) '
style = '#1793d1'
disabled = false

[os.symbols]
Arch = "󰣇"

# Shows the username
[username]
style_user = '#009815'
style_root = 'red bold'
format = '[$user]($style) '
disabled = false
show_always = true

[directory]
home_symbol = '󰋜 ~'
read_only_style = '197'
read_only = '  '
style = '#00B1D4'
format = '[$path]($style)[$read_only]($read_only_style) '

[git_branch]
format = '[$symbol$branch]($style) '
symbol = ''
style = '#B20010 bold'
